<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>GG Launcher Loading</title>
  <style>
    :root {
      --color-bg: #070709;
      --color-orange: #ff6600;
      --color-text: #f0f0f5;
      --color-text-secondary: #7a7a8f;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--color-bg);
      color: var(--color-text);
      width: 420px;
      height: 280px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
      border: 1px solid rgba(255, 102, 0, 0.3);
      box-shadow: 0 0 30px rgba(255, 102, 0, 0.15);
      overflow: hidden;
      position: relative;
    }
    .background-glow {
      position: absolute;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(255, 102, 0, 0.15) 0%, rgba(0,0,0,0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }
    .content {
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
    }
    .logo-container {
      position: relative;
      width: 72px;
      height: 72px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .logo-img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(255, 102, 0, 0.6));
      animation: pulse 2s infinite ease-in-out;
    }
    .brand-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #ffffff 0%, var(--color-orange) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .loading-status {
      font-size: 11px;
      color: var(--color-text-secondary);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
    }
    /* Pulsing Loading Bar */
    .loader-container {
      width: 220px;
      height: 3px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .loader-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, transparent, var(--color-orange), transparent);
      border-radius: 2px;
      box-shadow: 0 0 6px var(--color-orange);
      animation: loading-slide 1.5s infinite ease-in-out;
    }
    @keyframes pulse {
      0% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(255, 102, 0, 0.5)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 16px rgba(255, 102, 0, 0.8)); }
      100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(255, 102, 0, 0.5)); }
    }
    @keyframes loading-slide {
      0% { margin-left: -50%; }
      100% { margin-left: 110%; }
    }
  </style>
</head>
<body>
  <div class="background-glow"></div>
  <div class="content">
    <div class="logo-container">
      <img src="assets/logo.png" alt="GG" class="logo-img">
    </div>
    <div>
      <div class="brand-title">GG LAUNCHER</div>
      <div class="loader-container">
        <div class="loader-bar"></div>
      </div>
      <div class="loading-status">Wczytywanie launchera...</div>
    </div>
  </div>
</body>
</html>
